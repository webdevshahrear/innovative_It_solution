<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Work Flows – Innovative IT Solutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ═══════════════════════════════════════
       LOGO COLOR PALETTE
       Dark Navy  : #1e1b4b
       Deep Blue  : #3d5af1  /  #5e78f5
       Orange     : #f07d00
       Red-Orange : #e8430a
       White      : #ffffff
    ═══════════════════════════════════════ */

    :root {
      --navy:       #1e1b4b;
      --blue:       #3d5af1;
      --blue-light: #5e78f5;
      --orange:     #f07d00;
      --red-orange: #e8430a;
      --white:      #ffffff;
      --text-gray:  #cdd5f5;
      --ring-color: rgba(61,90,241,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--navy);
      color: var(--white);
    }

    /* ── SECTION WRAPPER ── */
    .section-wrapper {
      padding: 70px 40px 80px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* Decorative blobs */
    .section-wrapper::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(61,90,241,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .section-wrapper::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -60px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(232,67,10,0.14) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* ── HEADING ── */
    .section-title {
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      color: var(--white);
      margin-bottom: 60px;
      letter-spacing: -0.5px;
    }
    .section-title span {
      background: linear-gradient(90deg, var(--blue-light), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--orange));
      border-radius: 2px;
      margin: 10px auto 0;
    }

    /* ── TWO COLUMNS ── */
    .content-row {
      display: flex;
      align-items: center;
      gap: 60px;
      flex-wrap: wrap;
    }

    /* ── LEFT: CIRCLE WORKFLOW ── */
    .workflow-left {
      flex: 0 0 520px;
      position: relative;
    }

    .circle-wrapper {
      position: relative;
      width: 500px;
      height: 500px;
      margin: 0 auto;
    }

    /* Outer dashed ring */
    .big-ring-outer {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 390px; height: 390px;
      border-radius: 50%;
      border: 1px dashed rgba(61,90,241,0.18);
    }

    /* Main ring */
    .big-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 1.5px solid var(--ring-color);
      box-shadow: 0 0 30px rgba(61,90,241,0.1);
    }

    /* Center text */
    .center-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 195px;
      z-index: 5;
    }
    .center-text h3 {
      font-size: 21px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--orange), var(--red-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .center-text p {
      font-size: 12.5px;
      color: var(--text-gray);
      line-height: 1.65;
    }

    @keyframes fadeSwap {
      0%   { opacity: 0; transform: translate(-50%, -44%); }
      100% { opacity: 1; transform: translate(-50%, -50%); }
    }
    .center-text.animate { animation: fadeSwap 0.4s ease forwards; }

    /* ── NODES ── */
    .node {
      position: absolute;
      width: 78px; height: 78px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(61,90,241,0.35);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: all 0.3s ease;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .node i {
      font-size: 26px;
      background: linear-gradient(135deg, var(--orange), var(--red-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .node:hover {
      border-color: var(--blue-light);
      box-shadow: 0 6px 24px rgba(61,90,241,0.4);
      transform: translate(-50%, -50%) scale(1.08);
    }
    .node.active {
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      border-color: var(--blue-light);
      box-shadow: 0 6px 28px rgba(61,90,241,0.55);
    }
    .node.active i {
      background: none;
      -webkit-text-fill-color: var(--white);
      color: var(--white);
    }

    /* Node positions */
    .node-1 { left: 148px; top:  72px; }
    .node-2 { left: 352px; top:  72px; }
    .node-3 { left: 460px; top: 250px; }
    .node-4 { left: 352px; top: 428px; }
    .node-5 { left: 148px; top: 428px; }
    .node-6 { left:  40px; top: 250px; }

    /* ── RIGHT: STATS ── */
    .stats-right {
      flex: 1;
      min-width: 280px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 44px 20px;
    }
    .stat-item { text-align: left; }

    .stat-number {
      font-size: 54px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
      display: flex;
      align-items: flex-start;
    }
    .stat-number .plus {
      font-size: 28px;
      background: linear-gradient(135deg, var(--orange), var(--red-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 6px;
      font-weight: 900;
    }
    .stat-label {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 1.6px;
      color: var(--text-gray);
      text-transform: uppercase;
      margin-top: 7px;
    }
    .stat-item::after {
      content: '';
      display: block;
      width: 36px;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--orange));
      border-radius: 2px;
      margin-top: 10px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .content-row { flex-direction: column; align-items: center; }
      .workflow-left { flex: none; }
      .stats-right { text-align: center; }
      .stat-item { text-align: center; }
      .stat-number { justify-content: center; }
      .stat-item::after { margin: 10px auto 0; }
    }
    @media (max-width: 560px) {
      .circle-wrapper { transform: scale(0.62); transform-origin: top center; }
      .section-wrapper { padding: 50px 20px 60px; }
      .section-title { font-size: 26px; }
    }
  </style>
</head>
<body>
<div class="section-wrapper">

  <h2 class="section-title">Our <span>Work Flows</span></h2>

  <div class="content-row">

    <!-- LEFT: Circular Workflow -->
    <div class="workflow-left">
      <div class="circle-wrapper">
        <div class="big-ring-outer"></div>
        <div class="big-ring"></div>

        <div class="center-text" id="centerText">
          <h3 id="centerTitle">Design</h3>
          <p id="centerDesc">We develop a user friendly responsive layout with the content generally provided by the client and convert your vision into design and development.</p>
        </div>

        <div class="node node-1"
             data-title="Discovery"
             data-desc="We consult with clients to understand their goals, audience and project requirements thoroughly."
             onclick="setActive(this)">
          <i class="fa-solid fa-handshake"></i>
        </div>

        <div class="node node-2"
             data-title="Idea & Concept"
             data-desc="We brainstorm creative concepts and innovative ideas that best align with your business vision."
             onclick="setActive(this)">
          <i class="fa-solid fa-lightbulb"></i>
        </div>

        <div class="node node-3 active"
             data-title="Design"
             data-desc="We develop a user friendly responsive layout with the content generally provided by the client and convert your vision into design and development."
             onclick="setActive(this)">
          <i class="fa-solid fa-desktop"></i>
        </div>

        <div class="node node-4"
             data-title="Support & Maintenance"
             data-desc="We provide ongoing support, updates and maintenance to keep your product running flawlessly."
             onclick="setActive(this)">
          <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>

        <div class="node node-5"
             data-title="Testing & QA"
             data-desc="We rigorously test every feature for performance, compatibility and quality before going live."
             onclick="setActive(this)">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="node node-6"
             data-title="Development"
             data-desc="We build scalable, clean-coded solutions bringing your approved designs to life with precision."
             onclick="setActive(this)">
          <i class="fa-solid fa-rocket"></i>
        </div>

      </div>
    </div>

    <!-- RIGHT: Stats -->
    <div class="stats-right">
      <div class="stats-grid">

        <div class="stat-item">
          <div class="stat-number">
            <span class="count" data-target="8">0</span>
            <span class="plus">+</span>
          </div>
          <div class="stat-label">Years in Business</div>
        </div>

        <div class="stat-item">
          <div class="stat-number">
            <span class="count" data-target="2000">0</span>
            <span class="plus">+</span>
          </div>
          <div class="stat-label">Finished Projects</div>
        </div>

        <div class="stat-item">
          <div class="stat-number">
            <span class="count" data-target="1500">0</span>
            <span class="plus">+</span>
          </div>
          <div class="stat-label">Clients</div>
        </div>

        <div class="stat-item">
          <div class="stat-number">
            <span class="count" data-target="1200">0</span>
            <span class="plus">+</span>
          </div>
          <div class="stat-label">Positive Reviews</div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  function setActive(el) {
    document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    const ct = document.getElementById('centerText');
    ct.classList.remove('animate');
    void ct.offsetWidth;
    ct.classList.add('animate');
    document.getElementById('centerTitle').textContent = el.getAttribute('data-title');
    document.getElementById('centerDesc').textContent  = el.getAttribute('data-desc');
  }

  function animateCounter(el) {
    const target = parseInt(el.getAttribute('data-target'));
    const step   = target / (2000 / 16);
    let current  = 0;
    const timer  = setInterval(() => {
      current += step;
      if (current >= target) { el.textContent = target.toLocaleString(); clearInterval(timer); }
      else { el.textContent = Math.floor(current).toLocaleString(); }
    }, 16);
  }

  const counters = document.querySelectorAll('.count');
  let started = false;

  new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && !started) {
        started = true;
        counters.forEach(c => animateCounter(c));
      }
    });
  }, { threshold: 0.3 }).observe(document.querySelector('.stats-right'));

  window.addEventListener('load', () => {
    const r = document.querySelector('.stats-right').getBoundingClientRect();
    if (r.top < window.innerHeight && !started) {
      started = true;
      counters.forEach(c => animateCounter(c));
    }
  });
</script>
</body>
</html>
